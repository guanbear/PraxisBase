protocol_version: "0.1"
name: praxisbase-openclaw-repair
default_scope: team
language: zh-CN
ui_language: zh-CN
content_language: zh-CN
knowledge_profile: openclaw
knowledge_bases:
  - id: openclaw
    label: OpenClaw 经验知识库
    profile: openclaw
    filter_mode: allowlist
    filter_rules:
      - keep_openclaw_repair
      - keep_openclaw_qa_policy
      - keep_verification_or_escalation
      - reject_greeting_only
  - id: k8s
    label: K8s 经验知识库
    profile: k8s
    filter_mode: allowlist
    filter_rules:
      - keep_k8s_repair
      - keep_verification_or_escalation
      - reject_greeting_only
curation_include_auto_released: true
knowledge_filter_rules:
  - keep_repair_actions
  - keep_verification_or_escalation
  - reject_greeting_only
