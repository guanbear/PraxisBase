<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PraxisBase 质量检查</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html" data-i18n="brand">PraxisBase 知识库</a>
    <div class="search">
      <input id="searchInput" type="search" placeholder="搜索知识" autocomplete="off">
      <div id="searchResults" class="search-results" hidden></div>
    </div>
    <nav class="topnav" aria-label="知识库视图" data-i18n-aria-label="nav.aria">
      <a href="index.html" data-i18n="nav.index">总览</a>
      <a href="review.html" data-i18n="nav.review">审批</a>
      <a href="graph.html" data-i18n="nav.graph">关系</a>
      <a href="issues.html" data-i18n="nav.issues">质检</a>
      <div class="language-switch" aria-label="切换语言" data-i18n-aria-label="language.switch">
        <svg class="language-switch-icon" aria-hidden="true" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M3 12h18"></path>
          <path d="M12 3c2.4 2.5 3.6 5.5 3.6 9s-1.2 6.5-3.6 9"></path>
          <path d="M12 3C9.6 5.5 8.4 8.5 8.4 12s1.2 6.5 3.6 9"></path>
        </svg>
        <button type="button" data-language-option="zh-CN" aria-pressed="true">中</button>
        <button type="button" data-language-option="en" aria-pressed="false">EN</button>
        <select id="languageSelect" class="language-select-native" aria-label="Language" tabindex="-1">
          <option value="zh-CN" selected>中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </nav>
  </header>
  <main class="issues-shell">
  <section class="hero">
    <div>
      <p class="eyebrow" data-i18n="issues.eyebrow">知识质检</p>
      <h1 data-i18n="issues.title">质量检查</h1>
      <p class="lede" data-i18n="issues.lede">展示会影响沉淀、引用或 Agent 使用可靠性的阻断项。</p>
    </div>
  </section>
  <section class="action-grid" aria-label="质量概览">
    <a class="action-card" href="#quality-findings" data-tone="ok">
    <span>质检发现</span>
    <strong>0</strong>
    <p>当前构建发现的问题。</p>
  </a>
    <a class="action-card" href="graph.html" data-tone="ok">
    <span>断链</span>
    <strong>0</strong>
    <p>来自关系图的无效链接。</p>
  </a>
    <a class="action-card" href="graph.html" data-tone="ok">
    <span>重复</span>
    <strong>0</strong>
    <p>需要合并或消重的页面。</p>
  </a>
    <a class="action-card" href="review.html#human-required" data-tone="danger">
    <span>隐私阻断</span>
    <strong>19</strong>
    <p>Daily 中仍需人工判断的项。</p>
  </a>
  </section>
  <section class="status-strip">
    <strong>怎么用</strong>
    <span>这里展示会影响入库或 Agent 使用可靠性的阻断项。没有发现时，代表当前静态知识站点没有阻塞性质量问题。</span>
  </section>
  <section class="issues-panel" id="quality-findings">
    <ol class="issue-list">
      <li data-i18n="issues.noIssues">当前没有阻塞性质量问题。</li>
    </ol>
  </section>
  <section class="issues-panel">
  <h2 data-i18n="issues.dailyPrivacy">Daily 隐私发现</h2>
  <dl>
    <dt>已拒绝</dt><dd>0</dd>
    <dt>需要人工</dt><dd>19</dd>
  </dl>
</section>
</main>
  <script>window.__PRAXISBASE_LANGUAGE__="zh-CN";</script>
  <script>window.__WIKI_BASE__="";</script>
  <script>window.__WIKI_GRAPH__={"protocol_version":"0.1","nodes":[],"links":[],"backlinks":{},"broken_links":[],"orphans":[],"duplicates":[]};</script>
  <script src="site.js"></script>
</body>
</html>
