variables:
  NODE_IMAGE: artifactory.ep.chehejia.com/docker-remote/library/node:20-alpine
  PRAXISBASE_TOOL_REPO: https://github.com/guanbear/PraxisBase.git
  PRAXISBASE_TOOL_REF: main
  PRAXISBASE_WRITEBACK: "false"
  PRAXISBASE_DAILY_LIMIT: "500"
  PRAXISBASE_MAX_AI_CHUNKS: "40"
  PRAXISBASE_MAX_CURATION_PROPOSALS: "8"
  PRAXISBASE_AI_CONCURRENCY: "4"
  PRAXISBASE_PRIVACY_LIMIT: "500"
  PRAXISBASE_TEAM_AUTO_REVIEW: "false"

stages:
  - harvest
  - privacy
  - review
  - promote
  - build

.praxisbase-knowledge:
  image: $NODE_IMAGE
  before_script:
    - apk add --no-cache git
    - corepack enable
    - git config --global user.name "praxisbase-bot"
    - git config --global user.email "praxisbase-bot@example.com"
    - |
      PRAXISBASE_TOOL_CLONE_URL="$PRAXISBASE_TOOL_REPO"
      if [ -n "${PRAXISBASE_PUSH_TOKEN:-}" ]; then
        case "$PRAXISBASE_TOOL_REPO" in
          https://*) PRAXISBASE_TOOL_CLONE_URL="https://oauth2:${PRAXISBASE_PUSH_TOKEN}@${PRAXISBASE_TOOL_REPO#https://}" ;;
        esac
      fi
      if ! git clone --depth 1 --branch "$PRAXISBASE_TOOL_REF" "$PRAXISBASE_TOOL_CLONE_URL" /tmp/PraxisBase; then
        fallback_ref="${CI_COMMIT_REF_NAME:-${CI_DEFAULT_BRANCH:-master}}"
        echo "PRAXISBASE_TOOL_REF=$PRAXISBASE_TOOL_REF is unavailable; falling back to $fallback_ref"
        git clone --depth 1 --branch "$fallback_ref" "$PRAXISBASE_TOOL_CLONE_URL" /tmp/PraxisBase
      fi
    - |
      if [ -n "${PRAXISBASE_PUSH_TOKEN:-}" ]; then
        git config --global url."https://oauth2:${PRAXISBASE_PUSH_TOKEN}@${CI_SERVER_HOST}/".insteadOf "https://${CI_SERVER_HOST}/"
      fi
    - cd /tmp/PraxisBase && pnpm install --frozen-lockfile && pnpm --filter @praxisbase/core build && pnpm --filter @praxisbase/cli build
    - cd "$CI_PROJECT_DIR"

.praxisbase-writeback:
  after_script:
    - |
      if [ "$PRAXISBASE_WRITEBACK" = "true" ]; then
        git config user.name "praxisbase-bot"
        git config user.email "praxisbase-bot@example.com"
        for path in .praxisbase kb skills dist; do
          [ -e "$path" ] && git add -f "$path"
        done
        git rm -r -f --cached --ignore-unmatch .praxisbase/cache
        if ! git diff --cached --quiet; then
          git commit -m "Update PraxisBase knowledge artifacts"
          git fetch "https://oauth2:${PRAXISBASE_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "${CI_COMMIT_BRANCH}"
          git rebase FETCH_HEAD
          git push "https://oauth2:${PRAXISBASE_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_COMMIT_BRANCH}
        fi
      fi

praxisbase:daily-harvest:
  extends:
    - .praxisbase-knowledge
    - .praxisbase-writeback
  stage: harvest
  resource_group: praxisbase-write
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $PRAXISBASE_TASK == "daily-harvest"
    - if: $CI_PIPELINE_SOURCE == "web" && $PRAXISBASE_TASK == "daily-harvest"
    - if: $CI_PIPELINE_SOURCE == "api" && $PRAXISBASE_TASK == "daily-harvest"
  script:
    - |
      PRAXISBASE_AI_FLAGS=""
      if [ "${PRAXISBASE_NO_AI:-false}" = "true" ]; then
        PRAXISBASE_AI_FLAGS="--no-ai"
      fi
      node /tmp/PraxisBase/packages/cli/dist/index.js daily run --mode team-git --limit "${PRAXISBASE_DAILY_LIMIT:-500}" --max-ai-chunks "${PRAXISBASE_MAX_AI_CHUNKS:-40}" --max-curation-proposals "${PRAXISBASE_MAX_CURATION_PROPOSALS:-8}" --ai-concurrency "${PRAXISBASE_AI_CONCURRENCY:-4}" $PRAXISBASE_AI_FLAGS --build-site --json > /tmp/praxisbase-daily.json
      cat /tmp/praxisbase-daily.json
      node -e 'const fs=require("fs"); const result=JSON.parse(fs.readFileSync(process.argv[1], "utf8")); if (result.ok === false) { console.error(result.message || "PraxisBase daily run failed"); process.exit(1); }' /tmp/praxisbase-daily.json

praxisbase:privacy-triage:
  extends:
    - .praxisbase-knowledge
    - .praxisbase-writeback
  stage: privacy
  resource_group: praxisbase-write
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $PRAXISBASE_TASK == "privacy-triage"
    - if: $CI_PIPELINE_SOURCE == "web" && $PRAXISBASE_TASK == "privacy-triage"
    - if: $CI_PIPELINE_SOURCE == "api" && $PRAXISBASE_TASK == "privacy-triage"
  script:
    - |
      PRAXISBASE_TRIAGE_FLAGS=""
      if [ "${PRAXISBASE_PRIVACY_INCLUDE_TRIAGED:-false}" = "true" ]; then
        PRAXISBASE_TRIAGE_FLAGS="--include-triaged"
      fi
      if [ "${PRAXISBASE_TEAM_AUTO_REVIEW:-false}" = "true" ]; then
        PRAXISBASE_TRIAGE_FLAGS="$PRAXISBASE_TRIAGE_FLAGS --team-auto-review"
      fi
      node /tmp/PraxisBase/packages/cli/dist/index.js privacy triage --mode team-git --limit "${PRAXISBASE_PRIVACY_LIMIT:-500}" --ai-concurrency "${PRAXISBASE_AI_CONCURRENCY:-4}" $PRAXISBASE_TRIAGE_FLAGS --json > /tmp/praxisbase-privacy-triage.json
      cat /tmp/praxisbase-privacy-triage.json
      node -e 'const fs=require("fs"); const result=JSON.parse(fs.readFileSync(process.argv[1], "utf8")); if (result.ok === false) { console.error(result.message || "PraxisBase privacy triage failed"); process.exit(1); }' /tmp/praxisbase-privacy-triage.json

praxisbase:review:
  extends:
    - .praxisbase-knowledge
    - .praxisbase-writeback
  stage: review
  resource_group: praxisbase-write
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $PRAXISBASE_TASK == "review"
    - if: $CI_PIPELINE_SOURCE == "web" && $PRAXISBASE_TASK == "review"
    - if: $CI_PIPELINE_SOURCE == "api" && $PRAXISBASE_TASK == "review"
  script:
    - node /tmp/PraxisBase/packages/cli/dist/index.js review --auto

praxisbase:promote:
  extends:
    - .praxisbase-knowledge
    - .praxisbase-writeback
  stage: promote
  resource_group: praxisbase-write
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $PRAXISBASE_TASK == "promote"
    - if: $CI_PIPELINE_SOURCE == "web" && $PRAXISBASE_TASK == "promote"
    - if: $CI_PIPELINE_SOURCE == "api" && $PRAXISBASE_TASK == "promote"
  script:
    - node /tmp/PraxisBase/packages/cli/dist/index.js promote --auto
    - node /tmp/PraxisBase/packages/cli/dist/index.js check

praxisbase:build:
  extends:
    - .praxisbase-knowledge
    - .praxisbase-writeback
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $PRAXISBASE_TASK == "build"
    - if: $CI_PIPELINE_SOURCE == "web" && $PRAXISBASE_TASK == "build"
    - if: $CI_PIPELINE_SOURCE == "api" && $PRAXISBASE_TASK == "build"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - node /tmp/PraxisBase/packages/cli/dist/index.js build
  artifacts:
    paths:
      - dist/
    expire_in: 7 days

pages:
  extends: .praxisbase-knowledge
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $PRAXISBASE_PAGES == "true"
  script:
    - node /tmp/PraxisBase/packages/cli/dist/index.js build
    - mkdir -p public
    - cp -r dist/* public/
  artifacts:
    paths:
      - public
